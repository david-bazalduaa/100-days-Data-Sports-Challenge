# ============================================================================
# 100 Days of Data & Sports Challenge — Conda Environment
# ============================================================================
# Usage: conda env create -f environment.yml
#        conda activate sports-analytics
# ============================================================================

name: sports-analytics
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip>=23.0

  # ── Core Data ──
  - pandas>=2.2
  - polars>=1.0
  - numpy>=1.26
  - pyarrow>=15.0
  - scipy>=1.12

  # ── Visualization ──
  - matplotlib>=3.8
  - seaborn>=0.13
  - plotly>=5.18

  # ── Machine Learning ──
  - scikit-learn>=1.4
  - xgboost>=2.0
  - lightgbm>=4.3
  - shap>=0.45

  # ── Utilities ──
  - requests>=2.31
  - beautifulsoup4>=4.12
  - lxml>=5.1
  - tqdm>=4.66
  - pyyaml>=6.0
  - python-dotenv>=1.0
  - joblib>=1.3

  # ── Jupyter ──
  - jupyterlab>=4.1
  - ipywidgets>=8.1

  # ── Dev Tools ──
  - pytest>=8.0
  - black>=24.2
  - pre-commit>=3.6

  # ── Pip-only packages ──
  - pip:
      - statsbombpy>=1.13
      - nfl-data-py>=0.3
      - mplsoccer>=1.3
      - optuna>=3.5
      - mlflow>=2.11
      - ydata-profiling>=4.6
      - ruff>=0.3
      - nbstripout>=0.7
      - fastapi>=0.110
      - uvicorn[standard]>=0.27
      - pydantic>=2.6
      - streamlit>=1.32
